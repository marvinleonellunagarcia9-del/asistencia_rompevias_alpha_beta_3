<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Asistencia PRO</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Librería para el escáner de Códigos QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
          .pb-safe { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
        }
        /* Ajustes para el escáner QR para que se vea bien en móviles */
        #qr-reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 12px; overflow: hidden; border: none !important; }
        #qr-reader__scan_region { background: black; }
        #qr-reader button { background: #2563eb; color: white; padding: 8px 16px; border-radius: 8px; font-weight: bold; margin: 5px; cursor: pointer; border: none; }
        #qr-reader a { color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // ============================================================================
        // ⚠️ PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE PARA QUE FUNCIONE EN TODOS LADOS ⚠️
        // Reemplaza el "null" por las llaves de tu proyecto. Ejemplo:
        // let MI_PROPIA_BASE_DE_DATOS = { apiKey: "AIza...", projectId: "mi-app", ... };
        // ============================================================================
        let MI_PROPIA_BASE_DE_DATOS = {
            apiKey: "AIzaSyDJMcdlz1nlUcCynonikWnvQMIPQEVvp2Y",
            authDomain: "asistencia-d5169.firebaseapp.com",
            projectId: "asistencia-d5169",
            storageBucket: "asistencia-d5169.firebasestorage.app",
            messagingSenderId: "231825021032",
            appId: "1:231825021032:web:e39fad074e1f7e4454c3dd",
            measurementId: "G-NP5Z250FVS"
        }; 

        // Respaldo por si habían guardado la config desde la web anterior
        const savedConfigStr = localStorage.getItem('custom_firebase_config');
        if (!MI_PROPIA_BASE_DE_DATOS && savedConfigStr) { 
            try { MI_PROPIA_BASE_DE_DATOS = JSON.parse(savedConfigStr); } catch(e) {} 
        }

        let app, auth, db, appId;
        try {
            if (MI_PROPIA_BASE_DE_DATOS) {
                app = initializeApp(MI_PROPIA_BASE_DE_DATOS);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = 'mi-app-propia';
            } else if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            }
        } catch (error) { console.error("No hay nube disponible, operando en modo local."); }

        // --- ICONOS SVG ---
        const IconUsers = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg>;
        const IconCheckSquare = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>;
        const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><line x1="10" x2="8" y1="9" y2="9"></line></svg>;
        const IconCloud = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>;
        const IconUploadCloud = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>;
        const IconPlus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>;
        const IconTrash2 = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>;
        const IconCheckCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconXCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" x2="9" y1="9" y2="15"></line><line x1="9" x2="15" y1="9" y2="15"></line></svg>;
        const IconAlertCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>;
        const IconUser = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconQrCode = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><path d="M7 7h.01"></path><path d="M18 7h.01"></path><path d="M18 18h.01"></path><path d="M7 18h.01"></path></svg>;
        const IconNfc = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 8v8"></path><path d="M8 6v12"></path><path d="M12 4v16"></path><path d="M16 6v12"></path><path d="M20 8v8"></path></svg>;

        function App() {
            // --- ESTADOS ---
            const [user, setUser] = useState(null);
            const [users, setUsers] = useState(() => JSON.parse(localStorage.getItem('local_users')) || []);
            const [activities, setActivities] = useState(() => JSON.parse(localStorage.getItem('local_activities')) || []);
            const [attendance, setAttendance] = useState(() => JSON.parse(localStorage.getItem('local_attendance')) || {});
            
            const [loadingDb, setLoadingDb] = useState(!!db);
            const [isOnline, setIsOnline] = useState(false);
            
            const [activeTab, setActiveTab] = useState('users');
            const [notification, setNotification] = useState(null);

            // Estados del Escáner QR / NFC
            const [scannerActive, setScannerActive] = useState(false);
            const [nfcSupported, setNfcSupported] = useState('NDEFReader' in window);
            const [qrModalUser, setQrModalUser] = useState(null);
            
            const lastScanRef = useRef({ data: null, time: 0 });

            // Formulario de Usuario
            const [userForm, setUserForm] = useState({ fullName: '', age: '', idNumber: '', address: '', phone: '', email: '', photo: null, nfcId: '' });
            const [activityForm, setActivityForm] = useState({ name: '', date: '' });
            const [selectedActivityForAttendance, setSelectedActivityForAttendance] = useState('');
            const [selectedActivityForReport, setSelectedActivityForReport] = useState('');

            // Verificar si hay datos locales atrapados
            const localU = JSON.parse(localStorage.getItem('local_users')) || [];
            const hasLocalDataToSync = localU.length > 0;

            // --- SINCRONIZACIÓN LOCAL ---
            useEffect(() => { if (!isOnline) localStorage.setItem('local_users', JSON.stringify(users)); }, [users, isOnline]);
            useEffect(() => { if (!isOnline) localStorage.setItem('local_activities', JSON.stringify(activities)); }, [activities, isOnline]);
            useEffect(() => { if (!isOnline) localStorage.setItem('local_attendance', JSON.stringify(attendance)); }, [attendance, isOnline]);

            // --- FIREBASE EFECTOS ---
            useEffect(() => {
                if (!auth) { setLoadingDb(false); return; }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } 
                        else { await signInAnonymously(auth); }
                    } catch (err) { console.error("Error Auth:", err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                setIsOnline(true);
                
                const unsubUsers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                    setUsers(snap.docs.map(d => ({ ...d.data(), id: d.id })));
                    setLoadingDb(false);
                }, console.error);

                const unsubActivities = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'activities'), (snap) => {
                    setActivities(snap.docs.map(d => ({ ...d.data(), id: d.id })));
                }, console.error);

                const unsubAttendance = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), (snap) => {
                    const attData = {};
                    snap.docs.forEach(d => { attData[d.id] = d.data(); });
                    setAttendance(attData);
                }, console.error);

                return () => { unsubUsers(); unsubActivities(); unsubAttendance(); };
            }, [user]);

            // --- ESCÁNER QR EFFECT ---
            useEffect(() => {
                let html5QrcodeScanner;
                if (scannerActive && document.getElementById("qr-reader")) {
                    html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                    html5QrcodeScanner.render((decodedText) => processScannedData(decodedText), () => {});
                }
                return () => { if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => console.error(e)); };
            }, [scannerActive]); 

            // --- FUNCIONES AUXILIARES ---
            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const generateId = () => Math.random().toString(36).substr(2, 9);

            // MIGRAR DATOS LOCALES A LA NUBE
            const syncLocalToCloud = async () => {
                if (!isOnline || !db) return;
                if (confirm("¿Estás seguro que deseas subir todos los datos que guardaste en esta computadora a la nube de Firebase?")) {
                    try {
                        const lUsers = JSON.parse(localStorage.getItem('local_users')) || [];
                        const lActivities = JSON.parse(localStorage.getItem('local_activities')) || [];
                        const lAttendance = JSON.parse(localStorage.getItem('local_attendance')) || {};

                        for (const u of lUsers) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.id), u);
                        for (const a of lActivities) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activities', a.id), a);
                        for (const [actId, attObj] of Object.entries(lAttendance)) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', actId), attObj, { merge: true });
                        }

                        // Limpiar local storage para que ya no pida subir
                        localStorage.removeItem('local_users');
                        localStorage.removeItem('local_activities');
                        localStorage.removeItem('local_attendance');
                        showNotification("¡Datos migrados exitosamente a la nube!", "success");
                    } catch (error) {
                        showNotification("Hubo un error al subir los datos.", "error");
                    }
                }
            };

            // --- LÓGICA DE ESCANEO (QR y NFC) ---
            const processScannedData = async (scannedData) => {
                if (lastScanRef.current.data === scannedData && (Date.now() - lastScanRef.current.time < 3000)) return;
                lastScanRef.current = { data: scannedData, time: Date.now() };

                const foundUser = users.find(u => u.id === scannedData || u.nfcId === scannedData);

                if (foundUser) {
                    if (!selectedActivityForAttendance) return showNotification('Selecciona una actividad primero', 'error');
                    
                    const isAlreadyPresent = attendance[selectedActivityForAttendance]?.[foundUser.id] || false;
                    
                    if (!isAlreadyPresent) {
                        if (isOnline && db) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', selectedActivityForAttendance), { [foundUser.id]: true }, { merge: true });
                        } else {
                            setAttendance(prev => ({ ...prev, [selectedActivityForAttendance]: { ...(prev[selectedActivityForAttendance] || {}), [foundUser.id]: true } }));
                        }
                        showNotification(`¡Asistencia de ${foundUser.fullName} registrada!`, 'success');
                        
                        try {
                            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const oscillator = audioCtx.createOscillator();
                            const gainNode = audioCtx.createGain();
                            oscillator.connect(gainNode);
                            gainNode.connect(audioCtx.destination);
                            oscillator.type = 'sine';
                            oscillator.frequency.value = 800;
                            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                            gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05);
                            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                            oscillator.start(audioCtx.currentTime);
                            oscillator.stop(audioCtx.currentTime + 0.2);
                        } catch(e) {}
                    } else {
                        showNotification(`${foundUser.fullName} ya estaba marcado presente.`, 'success');
                    }
                } else {
                    showNotification('Código o Tarjeta no registrados en el sistema', 'error');
                }
            };

            const startNfcScanner = async () => {
                if (!nfcSupported) return showNotification('NFC no soportado en este dispositivo (Usa Android/Chrome)', 'error');
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    showNotification("Acerca la tarjeta RFID/NFC al celular...", "success");
                    ndef.onreading = event => processScannedData(event.serialNumber);
                } catch (error) { showNotification("Error activando NFC. Revisa permisos.", "error"); }
            };

            const readNfcForForm = async (e) => {
                e.preventDefault();
                if (!nfcSupported) return showNotification('NFC no soportado en este dispositivo', 'error');
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    showNotification("Acerca la tarjeta RFID/NFC para vincularla...", "success");
                    ndef.onreading = event => {
                        setUserForm(prev => ({ ...prev, nfcId: event.serialNumber }));
                        showNotification('¡Tarjeta vinculada con éxito!', 'success');
                    };
                } catch (error) { showNotification("Error leyendo NFC.", "error"); }
            };

            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 1000000) return showNotification('La imagen es muy grande (Máx 1MB)', 'error');
                    const reader = new FileReader();
                    reader.onloadend = () => setUserForm(prev => ({ ...prev, photo: reader.result }));
                    reader.readAsDataURL(file);
                }
            };

            // --- ACCIONES (Guardar/Eliminar) ---
            const handleAddUser = async (e) => {
                e.preventDefault();
                if (!userForm.fullName || !userForm.idNumber) return showNotification('El nombre y la identificación son obligatorios', 'error');
                const id = generateId();
                const newUser = { ...userForm, id };
                
                if (isOnline && db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id), newUser);
                else setUsers(prev => [...prev, newUser]);
                
                setUserForm({ fullName: '', age: '', idNumber: '', address: '', phone: '', email: '', photo: null, nfcId: '' });
                const photoInput = document.getElementById('photoInput');
                if (photoInput) photoInput.value = '';
                showNotification('Usuario registrado exitosamente');
            };

            const handleDeleteUser = async (id) => {
                if (window.confirm('¿Seguro que deseas eliminar este usuario?')) {
                    if (isOnline && db) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
                    else setUsers(prev => prev.filter(u => u.id !== id));
                    showNotification('Usuario eliminado');
                }
            };

            const handleAddActivity = async (e) => {
                e.preventDefault();
                if (!activityForm.name || !activityForm.date) return showNotification('Faltan datos', 'error');
                const id = generateId();
                if (isOnline && db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activities', id), { ...activityForm, id });
                else setActivities(prev => [...prev, { ...activityForm, id }]);
                setActivityForm({ name: '', date: '' });
                showNotification('Actividad creada');
            };

            const toggleAttendance = async (activityId, userId) => {
                const currentStatus = attendance[activityId]?.[userId] || false;
                if (isOnline && db) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', activityId), { [userId]: !currentStatus }, { merge: true });
                } else {
                    setAttendance(prev => ({ ...prev, [activityId]: { ...(prev[activityId] || {}), [userId]: !currentStatus } }));
                }
            };

            const markAll = async (activityId, status) => {
                const newStatus = {};
                users.forEach(u => { newStatus[u.id] = status; });
                if (isOnline && db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', activityId), newStatus, { merge: true });
                else setAttendance(prev => ({ ...prev, [activityId]: newStatus }));
            };

            // --- VISTAS ---
            const renderNotification = () => {
                if (!notification) return null;
                return (
                    <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 p-4 rounded-lg shadow-lg z-50 flex items-center space-x-2 w-11/12 max-w-md ${notification.type === 'error' ? 'bg-red-100 text-red-800 border border-red-200' : 'bg-green-100 text-green-800 border border-green-200'}`}>
                        {notification.type === 'error' ? <IconAlertCircle size={20} /> : <IconCheckCircle size={20} />}
                        <span className="font-medium">{notification.msg}</span>
                    </div>
                );
            };

            const renderQrModal = () => {
                if (!qrModalUser) return null;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${qrModalUser.id}`;
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-xl p-6 flex flex-col items-center max-w-sm w-full">
                            <h3 className="font-bold text-lg text-slate-800 mb-2">Código QR</h3>
                            <p className="text-slate-500 mb-4">{qrModalUser.fullName}</p>
                            <div className="bg-slate-100 p-4 rounded-lg mb-4 shadow-inner">
                                <img src={qrUrl} alt={`QR de ${qrModalUser.fullName}`} className="w-48 h-48" />
                            </div>
                            <p className="text-xs text-slate-400 text-center mb-6">Muestra este código a la cámara para registrar tu asistencia rápidamente.</p>
                            <button onClick={() => setQrModalUser(null)} className="w-full bg-slate-200 text-slate-800 p-3 rounded-lg font-bold hover:bg-slate-300">Cerrar</button>
                        </div>
                    </div>
                );
            };

            const renderUsersTab = () => (
                <div className="space-y-6 pb-20">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <h2 className="text-xl font-bold text-slate-800 mb-4">Registrar Usuario</h2>
                        <form onSubmit={handleAddUser} className="space-y-4">
                            <div><label className="block text-sm font-medium text-slate-600 mb-1">Nombre Completo *</label><input type="text" value={userForm.fullName} onChange={e => setUserForm({...userForm, fullName: e.target.value})} className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Juan Pérez" /></div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-sm font-medium text-slate-600 mb-1">Edad</label><input type="number" value={userForm.age} onChange={e => setUserForm({...userForm, age: e.target.value})} className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. 25" /></div>
                                <div><label className="block text-sm font-medium text-slate-600 mb-1">Identificación *</label><input type="text" value={userForm.idNumber} onChange={e => setUserForm({...userForm, idNumber: e.target.value})} className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="DPI / Cédula" /></div>
                            </div>
                            <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                <label className="block text-sm font-medium text-slate-600 mb-1">Tarjeta RFID / NFC (Opcional)</label>
                                <div className="flex space-x-2">
                                    <input type="text" value={userForm.nfcId} onChange={e => setUserForm({...userForm, nfcId: e.target.value})} className="flex-1 p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white" placeholder="ID de la Tarjeta" />
                                    {nfcSupported && <button onClick={readNfcForForm} className="bg-blue-100 text-blue-700 px-4 rounded-lg font-semibold flex items-center shadow-sm hover:bg-blue-200"><IconNfc size={18} className="mr-1" /> Leer</button>}
                                </div>
                                {!nfcSupported && <p className="text-xs text-slate-400 mt-1">Tu navegador no soporta lectura NFC directa.</p>}
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div><label className="block text-sm font-medium text-slate-600 mb-1">Teléfono</label><input type="tel" value={userForm.phone} onChange={e => setUserForm({...userForm, phone: e.target.value})} className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. 5555-5555" /></div>
                                <div><label className="block text-sm font-medium text-slate-600 mb-1">Correo Electrónico</label><input type="email" value={userForm.email} onChange={e => setUserForm({...userForm, email: e.target.value})} className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold flex justify-center items-center space-x-2 hover:bg-blue-700"><IconPlus size={20} /> <span>Guardar Usuario</span></button>
                        </form>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-100"><h3 className="font-bold text-slate-700">Usuarios ({users.length})</h3></div>
                        <div className="divide-y divide-slate-100">
                            {users.length === 0 ? <p className="p-6 text-center text-slate-400">No hay usuarios.</p> : users.map(user => (
                                <div key={user.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><IconUser size={20} /></div>
                                        <div>
                                            <p className="font-semibold text-slate-800">{user.fullName}</p>
                                            <div className="flex items-center space-x-2 mt-0.5">
                                                <span className="text-xs text-slate-500 bg-slate-100 px-2 py-0.5 rounded">ID: {user.idNumber}</span>
                                                {user.nfcId && <span className="text-xs text-purple-600 bg-purple-100 px-2 py-0.5 rounded flex items-center"><IconNfc size={10} className="mr-1"/> NFC</span>}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-center space-x-1">
                                        <button onClick={() => setQrModalUser(user)} className="text-slate-400 hover:text-blue-600 p-2 bg-slate-50 hover:bg-blue-50 rounded-lg" title="Ver QR"><IconQrCode size={20} /></button>
                                        <button onClick={() => handleDeleteUser(user.id)} className="text-red-400 p-2 hover:bg-red-50 rounded-lg"><IconTrash2 size={20} /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderActivitiesTab = () => (
                <div className="space-y-6 pb-20">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <h2 className="text-xl font-bold text-slate-800 mb-4">Programar Actividad</h2>
                        <form onSubmit={handleAddActivity} className="space-y-4">
                            <div><label className="block text-sm mb-1">Nombre *</label><input type="text" value={activityForm.name} onChange={e => setActivityForm({...activityForm, name: e.target.value})} className="w-full p-3 border rounded-lg" /></div>
                            <div><label className="block text-sm mb-1">Fecha *</label><input type="date" value={activityForm.date} onChange={e => setActivityForm({...activityForm, date: e.target.value})} className="w-full p-3 border rounded-lg" /></div>
                            <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Crear Actividad</button>
                        </form>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-100"><h3 className="font-bold">Actividades ({activities.length})</h3></div>
                        <div className="divide-y">
                            {activities.map(act => <div key={act.id} className="p-4"><p className="font-bold">{act.name}</p><p className="text-sm text-slate-500">{act.date}</p></div>)}
                        </div>
                    </div>
                </div>
            );

            const renderAttendanceTab = () => (
                <div className="space-y-6 pb-20">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <h2 className="text-xl font-bold text-slate-800 mb-4">Tomar Asistencia</h2>
                        <select value={selectedActivityForAttendance} onChange={e => setSelectedActivityForAttendance(e.target.value)} className="w-full p-3 border border-slate-200 rounded-lg outline-none bg-white focus:ring-2 focus:ring-blue-500 mb-4">
                            <option value="">-- Selecciona la actividad primero --</option>
                            {activities.map(act => <option key={act.id} value={act.id}>{act.name} ({act.date})</option>)}
                        </select>

                        {selectedActivityForAttendance && (
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mt-4">
                                {!scannerActive ? (
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => setScannerActive(true)} className="flex flex-col items-center justify-center bg-white p-4 rounded-lg shadow-sm border border-slate-200 text-blue-600 hover:bg-blue-50">
                                            <IconQrCode size={32} className="mb-2" />
                                            <span className="font-semibold text-sm">Cámara QR</span>
                                        </button>
                                        <button onClick={startNfcScanner} className={`flex flex-col items-center justify-center bg-white p-4 rounded-lg shadow-sm border border-slate-200 ${nfcSupported ? 'text-purple-600 hover:bg-purple-50' : 'text-slate-300'}`} disabled={!nfcSupported}>
                                            <IconNfc size={32} className="mb-2" />
                                            <span className="font-semibold text-sm">Lector NFC</span>
                                            {!nfcSupported && <span className="text-[10px] text-slate-400 mt-1">No disponible</span>}
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center">
                                        <div className="w-full bg-black rounded-xl overflow-hidden mb-4 relative shadow-inner">
                                            <div id="qr-reader"></div>
                                        </div>
                                        <button onClick={() => setScannerActive(false)} className="bg-red-100 text-red-700 px-6 py-2 rounded-full font-bold shadow-sm">Detener Cámara</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {selectedActivityForAttendance && users.length > 0 && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                                <h3 className="font-bold text-slate-700">Lista Manual</h3>
                            </div>
                            <div className="divide-y divide-slate-100">
                                {users.map(user => {
                                    const isPresent = attendance[selectedActivityForAttendance]?.[user.id] || false;
                                    return (
                                        <div key={user.id} className="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50" onClick={() => toggleAttendance(selectedActivityForAttendance, user.id)}>
                                            <div><p className="font-semibold">{user.fullName}</p><p className="text-xs text-slate-500">{user.idNumber}</p></div>
                                            <div>{isPresent ? <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Presente</span> : <span className="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-xs font-bold">Ausente</span>}</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );

            const renderReportsTab = () => {
                const act = activities.find(a => a.id === selectedActivityForReport);
                let presentCount = 0, absentCount = 0;
                if (act) users.forEach(u => attendance[act.id]?.[u.id] ? presentCount++ : absentCount++);

                return (
                    <div className="space-y-6 pb-20">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <h2 className="text-xl font-bold text-slate-800 mb-4">Reporte Global</h2>
                            <select value={selectedActivityForReport} onChange={e => setSelectedActivityForReport(e.target.value)} className="w-full p-3 border rounded-lg bg-white mb-4">
                                <option value="">-- Selecciona una actividad --</option>
                                {activities.map(a => <option key={a.id} value={a.id}>{a.name} ({a.date})</option>)}
                            </select>
                        </div>
                        {act && (
                            <>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-green-50 p-4 rounded-xl text-center"><p className="text-green-600 font-bold">Presentes</p><p className="text-3xl text-green-700 font-bold">{presentCount}</p></div>
                                    <div className="bg-red-50 p-4 rounded-xl text-center"><p className="text-red-600 font-bold">Ausentes</p><p className="text-3xl text-red-700 font-bold">{absentCount}</p></div>
                                </div>
                                <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden mt-4">
                                    <table className="w-full text-left">
                                        <tbody>
                                            {users.map(user => {
                                                const isPresent = attendance[act.id]?.[user.id] || false;
                                                return (
                                                    <tr key={user.id} className="border-b">
                                                        <td className="p-4"><p className="font-bold">{user.fullName}</p></td>
                                                        <td className="p-4 text-right"><span className={`px-3 py-1 rounded-full text-xs font-bold ${isPresent ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}`}>{isPresent ? 'Presente' : 'Ausente'}</span></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}
                    </div>
                );
            };

            return (
                <div>
                    {renderNotification()}
                    {renderQrModal()}
                    
                    <header className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
                        <h1 className="text-xl font-bold text-center">Control de Asistencia</h1>
                    </header>
                    
                    {/* AVISO PARA SUBIR DATOS LOCALES A LA NUBE */}
                    {isOnline && hasLocalDataToSync && (
                        <div className="bg-indigo-50 border-b border-indigo-200 p-3 flex justify-between items-center shadow-sm">
                            <div className="flex items-center text-indigo-700">
                                <IconUploadCloud size={20} className="mr-2" />
                                <span className="text-xs font-medium">Tienes datos locales (Offline) sin subir.</span>
                            </div>
                            <button onClick={syncLocalToCloud} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm hover:bg-indigo-700">
                                Subir ahora
                            </button>
                        </div>
                    )}

                    {!isOnline && (
                        <div className="bg-yellow-50 text-yellow-700 p-2 text-center text-xs font-medium border-b border-yellow-200 flex justify-center">
                            <IconAlertCircle size={16} className="mr-1"/> Modo Offline Local (Firebase Config falta en el código)
                        </div>
                    )}

                    <main className="p-4 max-w-3xl mx-auto">
                        {activeTab === 'users' && renderUsersTab()}
                        {activeTab === 'activities' && renderActivitiesTab()}
                        {activeTab === 'attendance' && renderAttendanceTab()}
                        {activeTab === 'reports' && renderReportsTab()}
                    </main>
                    
                    <nav className="fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-between items-center px-2 py-1 pb-safe z-20">
                        <button onClick={() => setActiveTab('users')} className={`flex flex-col items-center p-2 w-full ${activeTab === 'users' ? 'text-blue-600' : 'text-slate-400'}`}><IconUsers size={20} /><span className="text-[10px] mt-1">Usuarios</span></button>
                        <button onClick={() => setActiveTab('activities')} className={`flex flex-col items-center p-2 w-full ${activeTab === 'activities' ? 'text-blue-600' : 'text-slate-400'}`}><IconCalendar size={20} /><span className="text-[10px] mt-1">Eventos</span></button>
                        <button onClick={() => setActiveTab('attendance')} className={`flex flex-col items-center p-2 w-full ${activeTab === 'attendance' ? 'text-blue-600' : 'text-slate-400'}`}><IconCheckSquare size={20} /><span className="text-[10px] mt-1">Asistencia</span></button>
                        <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center p-2 w-full ${activeTab === 'reports' ? 'text-blue-600' : 'text-slate-400'}`}><IconFileText size={20} /><span className="text-[10px] mt-1">Reportes</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
